kind = "web"
previewPath = "/"
title = "Temporary Group Maker"
version = "1.0.0"
id = "artifacts/group-maker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19352

[services.development]
run = "pnpm --filter @workspace/group-maker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/group-maker", "run", "build" ]
publicDir = "artifacts/group-maker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19352"
BASE_PATH = "/"
